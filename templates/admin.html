<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Retro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/static/images/logo.svg">
    <link rel="stylesheet" href="/static/style.css?v=103">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    <style>
        .admin-header { padding: 4rem 0 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--surface-border); margin-bottom: 3rem; }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">
        <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
    </button>
    <div class="container animate-fade-up">
        <header class="admin-header">
            <div>
                <h1 style="font-size: 1.5rem;">Admin Control</h1>
                <p style="color: var(--text-secondary); font-size: 0.875rem;">Platform-wide session monitoring and management.</p>
            </div>
            <a href="/" class="btn btn-ghost">Exit Dashboard</a>
        </header>

        <section class="card" style="padding: 0;">
            <div style="padding: 1.5rem 2rem; border-bottom: 1px solid var(--surface-border); display: flex; justify-content: space-between; align-items: center;">
                <h2 style="font-size: 1rem;">Active Discussions</h2>
                <div id="sessionCount" class="badge" style="background: var(--primary-light); color: var(--primary);">0 Sessions</div>
            </div>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Organization / Owner</th>
                            <th>Topic Name</th>
                            <th>Room ID</th>
                            <th>Status</th>
                            <th>Operations</th>
                        </tr>
                    </thead>
                    <tbody id="admin-session-body">
                        <tr><td colspan="5" style="text-align:center; padding:3rem; color:var(--text-muted); font-size: 0.875rem;">Fetching real-time data...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        function updateThemeIcon() {
            const theme = document.documentElement.getAttribute('data-theme');
            const icon = document.getElementById('theme-icon');
            if (theme === 'dark') {
                icon.innerHTML = '<path d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1-8.313-12.454z"></path>';
            } else {
                icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
            }
        }
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('theme', target);
            updateThemeIcon();
        }
        updateThemeIcon();

        async function loadAdminData() {
            try {
                const res = await fetch('/api/admin/sessions');
                if (res.status === 403) { window.location.href = "/"; return; }
                const data = await res.json();
                const tbody = document.getElementById('admin-session-body');
                document.getElementById('sessionCount').innerText = `${data.sessions ? data.sessions.length : 0} Total Sessions`;

                if (!data.sessions || data.sessions.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:3rem; color:var(--text-muted);">No active sessions.</td></tr>';
                    return;
                }

                tbody.innerHTML = data.sessions.map(s => `
                    <tr>
                        <td style="font-size: 0.75rem; color: var(--text-muted); font-family: monospace;">${s.owner_email}</td>
                        <td style="font-weight: 600;">${s.name}</td>
                        <td><code>${s.id}</code></td>
                        <td><span class="badge badge-success">Active</span></td>
                        <td><a href="/session/?id=${s.id}&role=sm" class="btn btn-ghost" style="padding: 0.3rem 0.8rem; font-size: 0.75rem;">Manage</a></td>
                    </tr>
                `).join('');
            } catch (e) { console.error(e); }
        }
        loadAdminData();
    </script>
</body>
</html>
