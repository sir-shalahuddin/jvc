<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Session - Discussion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/static/images/logo.svg">
    <link rel="stylesheet" href="/static/style.css?v=105">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    <style>
        .session-header { padding: 4rem 0 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); margin-bottom: 4rem; }
        .answer-pill {
            background: rgba(255, 255, 255, 0.4); border: 1px solid var(--glass-border);
            padding: 1.5rem; border-radius: 20px; margin-bottom: 1.5rem;
            backdrop-filter: blur(5px); animation: fadeUp 0.5s ease-out; transition: all var(--transition);
        }
        .answer-pill:hover { background: rgba(255, 255, 255, 0.6); transform: scale(1.02); }
        .sentiment-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        #nav-questions {
            position: fixed; bottom: 3rem; left: 50%; transform: translateX(-50%);
            display: flex; gap: 1rem; background: var(--glass-bg); padding: 1rem 2rem;
            border-radius: 50px; box-shadow: var(--glass-shadow); z-index: 1000; border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
        }
        .nav-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--text-muted); cursor: pointer; transition: 0.3s; }
        .nav-dot.active { background: var(--primary); transform: scale(1.5); }
        .ql-toolbar.ql-snow { border: none !important; background: rgba(255,255,255,0.5); border-radius: 12px 12px 0 0; }
        .ql-container.ql-snow { border: none !important; background: rgba(255,255,255,0.3); border-radius: 0 0 12px 12px; }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">
        <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
    </button>
    <div id="toast-container" style="position: fixed; top: 2rem; right: 2rem; z-index: 9999;"></div>

    <div class="container animate-fade-up">
        <header class="session-header">
            <div>
                <h1 id="sessionNameTitle" style="font-size: 2.5rem; background: linear-gradient(135deg, var(--text) 0%, var(--primary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Loading...</h1>
                <p id="sessionIdDisplay" style="color: var(--text-muted); font-size: 0.8rem; font-weight: 800; text-transform: uppercase; margin-top: 8px; letter-spacing: 0.1em;"></p>
            </div>
            <div style="display: flex; gap: 1rem;">
                <button onclick="copyInvite()" class="btn btn-ghost">Copy Invite</button>
                <a href="/" class="btn btn-ghost" style="color: var(--danger); border-color: rgba(239, 68, 68, 0.2);">Exit Room</a>
            </div>
        </header>

        <div id="questions-container"></div>
        <div id="nav-questions"></div>
    </div>

    <div id="submitModal" class="modal-overlay hidden">
        <div class="modal-content">
            <button onclick="closeSubmitModal()" style="position: absolute; top: 1.5rem; right: 1.5rem; border: none; background: none; font-size: 1.5rem; cursor: pointer; color: var(--text-muted);">&times;</button>
            <h2 id="modalQuestionTitle" style="font-size: 1.75rem; margin-bottom: 2rem;">New Perspective</h2>
            
            <div id="editor-wrapper" style="border: 1px solid var(--glass-border); border-radius: 16px; overflow: hidden; margin-bottom: 2rem;">
                <div id="editor-container" style="height: 200px; font-family: 'Inter', sans-serif;"></div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2.5rem;">
                <div>
                    <label style="display: block; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); margin-bottom: 0.75rem; text-transform: uppercase;">Alias (Optional)</label>
                    <input type="text" id="authorName" placeholder="Anonymous">
                </div>
                <div>
                    <label style="display: block; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); margin-bottom: 0.75rem; text-transform: uppercase;">Image URL (Optional)</label>
                    <input type="text" id="gifUrl" placeholder="GIF/Photo link">
                </div>
            </div>

            <button id="sendAnswerBtn" class="btn btn-primary" style="width: 100%; padding: 1.25rem;">Sync Feedback</button>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        let quill;
        let currentQuestions = [];
        let activeQuestionId = '';
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('id');

        function updateThemeIcon() {
            const theme = document.documentElement.getAttribute('data-theme');
            const icon = document.getElementById('theme-icon');
            if (theme === 'dark') { icon.innerHTML = '<path d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1-8.313-12.454z"></path>'; }
            else { icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>'; }
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('theme', target);
            updateThemeIcon();
        }

        async function init() {
            if (!sessionId) return window.location.href = '/';
            document.getElementById('sessionIdDisplay').innerText = `Room ID: ${sessionId}`;
            updateThemeIcon();
            quill = new Quill('#editor-container', { theme: 'snow', placeholder: 'Express your thoughts clearly...' });
            const res = await fetch(`/api/session/get?id=${sessionId}`);
            const session = await res.json();
            document.getElementById('sessionNameTitle').innerText = session.name;
            loadQuestions();
            setInterval(loadAnswers, 5000);
        }

        async function loadQuestions() {
            const res = await fetch(`/api/session/questions?session_id=${sessionId}`);
            currentQuestions = await res.json();
            const container = document.getElementById('questions-container');
            const nav = document.getElementById('nav-questions');

            container.innerHTML = currentQuestions.map(q => `
                <div id="q-${q.id}" class="card" style="display: none; padding: 3rem;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem;">
                        <h2 style="font-size: 2rem; margin:0;">${q.text}</h2>
                        <button onclick="openSubmitModal('${q.id}', '${q.text}')" class="btn btn-primary">Share Perspective</button>
                    </div>
                    <div id="answers-${q.id}" style="display: flex; flex-direction: column; gap: 1rem;">
                        <p style="color: var(--text-muted); text-align: center; padding: 4rem; font-weight: 600;">Waiting for team input...</p>
                    </div>
                </div>
            `).join('');

            nav.innerHTML = currentQuestions.map((q, i) => `<div class="nav-dot" onclick="showQuestion('${q.id}')" title="Topic ${i+1}"></div>`).join('');
            if (currentQuestions.length > 0) showQuestion(currentQuestions[0].id);
            loadAnswers();
        }

        function showQuestion(id) {
            currentQuestions.forEach(q => { document.getElementById(`q-${q.id}`).style.display = q.id === id ? 'block' : 'none'; });
            document.querySelectorAll('.nav-dot').forEach((dot, i) => { dot.classList.toggle('active', currentQuestions[i].id === id); });
            activeQuestionId = id;
        }

        async function loadAnswers() {
            const res = await fetch(`/api/session/answers?session_id=${sessionId}`);
            const answers = await res.json();
            currentQuestions.forEach(q => {
                const qAnswers = answers.filter(a => a.question_id === q.id);
                const aContainer = document.getElementById(`answers-${q.id}`);
                if (qAnswers.length > 0) {
                    aContainer.innerHTML = qAnswers.map(a => `
                        <div class="answer-pill">
                            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;">
                                <span style="font-weight: 900; font-size: 0.8rem; color: var(--primary); text-transform: uppercase;">${a.author_name || 'Anonymous Contributor'}</span>
                                <div style="display: flex; align-items: center; background: rgba(255,255,255,0.4); padding: 6px 12px; border-radius: 50px; border: 1px solid var(--glass-border);">
                                    <div class="sentiment-dot" style="background: ${a.sentiment_color || '#94a3b8'};"></div>
                                    <span style="font-size: 0.7rem; font-weight: 800; color: var(--text-secondary); text-transform: uppercase;">${a.sentiment_emotion || 'Analyzing'} ${a.sentiment_emoji || ''}</span>
                                </div>
                            </div>
                            <div style="font-size: 1.1rem; color: var(--text); line-height: 1.6;">${a.text}</div>
                            ${a.gif_url ? `<img src="${a.gif_url}" style="width: 100%; max-width: 320px; border-radius: 16px; margin-top: 1.5rem; border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow);">` : ''}
                        </div>
                    `).join('');
                }
            });
        }

        function openSubmitModal(id, text) { activeQuestionId = id; document.getElementById('modalQuestionTitle').innerText = text; document.getElementById('submitModal').classList.remove('hidden'); quill.setContents([]); }
        function closeSubmitModal() { document.getElementById('submitModal').classList.add('hidden'); }

        document.getElementById('sendAnswerBtn').onclick = async () => {
            const text = quill.root.innerHTML; const author = document.getElementById('authorName').value; const gif = document.getElementById('gifUrl').value;
            const btn = document.getElementById('sendAnswerBtn'); btn.disabled = true; btn.innerText = "Syncing...";
            try {
                const res = await fetch('/api/answer/submit', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ session_id: sessionId, question_id: activeQuestionId, text: text, author_name: author, gif_url: gif }) });
                if (res.ok) { closeSubmitModal(); loadAnswers(); showToast("Feedback synchronized", "success"); }
            } catch (e) { showToast("Sync failed", "error"); }
            finally { btn.disabled = false; btn.innerText = "Sync Feedback"; }
        };

        function copyInvite() { navigator.clipboard.writeText(window.location.origin + "/session/?id=" + sessionId); showToast("Invite link copied", "success"); }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.style.cssText = `background: var(--glass-bg); backdrop-filter: blur(10px); color: var(--text); padding: 1rem 1.5rem; border-radius: 16px; margin-bottom: 0.75rem; border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); display: flex; align-items: center; gap: 12px; font-weight: 600; animation: fadeUp 0.3s ease-out;`;
            toast.innerHTML = `<span>${type === 'error' ? '⚠️' : '✨'}</span> <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateY(-10px)'; toast.style.transition = '0.3s'; setTimeout(() => toast.remove(), 300); }, 3000);
        }
        init();
    </script>
</body>
</html>
/html>
