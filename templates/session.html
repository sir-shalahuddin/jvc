<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Session - Discussion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/static/images/logo.svg?v=106">
    <link rel="stylesheet" href="/static/style.css?v=105">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    <style>
        .session-header { padding: 3rem 0 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); margin-bottom: 3rem; }
        
        .answers-grid { column-width: 350px; column-gap: 1.5rem; width: 100%; max-width: 100%; perspective: 1500px; }
        
        .answer-card {
            break-inside: avoid; margin-bottom: 1.5rem; min-height: 220px; 
            width: 100%; cursor: pointer; position: relative;
            transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: inline-block;
        }
        .answer-card.flipped { transform: rotateY(180deg); }
        
        .card-face {
            position: relative; width: 100%; height: auto; min-height: 220px; backface-visibility: hidden;
            border-radius: 28px; padding: 1.75rem; border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow); backdrop-filter: blur(15px);
            display: flex; flex-direction: column; transition: 0.5s ease;
        }
        
        /* Mood Bias Glow Effect */
        .card-front { 
            background: var(--glass-bg); color: var(--primary); font-weight: 900; 
            font-size: 1.5rem; justify-content: center; align-items: center;
            position: absolute; top: 0; left: 0; height: 100%;
            overflow: hidden;
        }
        .card-front::after {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at center, var(--mood-color, transparent) 0%, transparent 70%);
            opacity: 0.15; transition: 0.8s;
        }
        
        .card-back { background: rgba(255, 255, 255, 0.95); color: var(--text); transform: rotateY(180deg); position: relative; height: auto; min-height: 100%; }
        [data-theme='dark'] .card-back { background: rgba(15, 23, 42, 0.95); }

        .warning-overlay {
            position: absolute; inset: 0; background: rgba(239, 68, 68, 0.95);
            color: white; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 28px; z-index: 10; text-align: center; padding: 1.5rem; backdrop-filter: blur(12px);
        }
        .warning-overlay span { font-weight: 900; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 0.5rem; letter-spacing: 0.1em; }

        .gif-results { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 1rem; max-height: 200px; overflow-y: auto; padding: 5px; }
        .gif-item { cursor: pointer; border-radius: 8px; width: 100%; height: 70px; object-fit: cover; transition: 0.3s; }
        .gif-item:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .gif-item.selected { border: 3px solid var(--primary); transform: scale(0.95); }

        #nav-questions {
            position: fixed; bottom: 2.5rem; left: 50%; transform: translateX(-50%);
            display: flex; gap: 1rem; background: var(--glass-bg); padding: 1rem 2rem;
            border-radius: 50px; box-shadow: var(--glass-shadow); z-index: 1000; border: 1px solid var(--glass-border);
            backdrop-filter: blur(25px);
        }
        .nav-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--text-muted); cursor: pointer; transition: 0.4s; }
        .nav-dot.active { background: var(--primary); transform: scale(1.5); }

        .nav-btn {
            position: fixed; top: 50%; transform: translateY(-50%);
            background: var(--glass-bg); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 50%;
            width: 60px; height: 60px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: var(--glass-shadow); z-index: 900; transition: 0.3s; color: var(--primary);
        }
        .nav-btn:hover { background: var(--primary); color: white; }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">
        <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
    </button>
    <div id="toast-container" style="position: fixed; top: 2rem; right: 2rem; z-index: 9999;"></div>

    <div class="container animate-fade-up">
        <header class="session-header">
            <div>
                <h1 id="sessionNameTitle" style="font-size: 2rem; margin:0;">Loading...</h1>
                <p id="sessionIdDisplay" style="color: var(--text-muted); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 6px;"></p>
            </div>
            <div style="display: flex; gap: 1rem;">
                <button onclick="exportToPDF()" class="btn btn-ghost" style="border-color: var(--primary); color: var(--primary);">Export PDF</button>
                <button onclick="copyInvite()" class="btn btn-ghost">Invite Team</button>
                <a href="/" class="btn btn-ghost" style="color: var(--danger);">Exit Session</a>
            </div>
        </header>

        <div id="questions-container"></div>
        <div id="nav-questions"></div>

        <div class="nav-btn prev" onclick="prevQuestion()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M15 18l-6-6 6-6"/></svg></div>
        <div class="nav-btn next" onclick="nextQuestion()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M9 18l6-6-6-6"/></svg></div>
    </div>

    <!-- Submit Modal -->
    <div id="submitModal" class="modal-overlay hidden">
        <div class="modal-content" style="max-width: 650px; padding: 2.5rem;">
            <button onclick="closeSubmitModal()" style="position: absolute; top: 1.5rem; right: 1.5rem; border: none; background: none; font-size: 1.5rem; cursor: pointer; color: var(--text-muted);">&times;</button>
            <h2 id="modalQuestionTitle" style="font-size: 1.5rem; margin-bottom: 2rem;">Add Your Feedback</h2>
            <div id="editor-wrapper" style="border: 1px solid var(--glass-border); border-radius: 16px; overflow: hidden; margin-bottom: 2rem; background: var(--bg-color);">
                <div id="editor-container" style="height: 150px; font-family: 'Inter', sans-serif; font-size: 1.1rem;"></div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 1.5rem;">
                <div>
                    <label style="display: block; font-size: 0.7rem; font-weight: 800; color: var(--text-muted); margin-bottom: 0.75rem; text-transform: uppercase;">Your Alias</label>
                    <input type="text" id="authorName" placeholder="e.g. Captain Nemo" style="width: 100%;">
                </div>
                <div>
                    <label style="display: block; font-size: 0.7rem; font-weight: 800; color: var(--text-muted); margin-bottom: 0.75rem; text-transform: uppercase;">Search GIF</label>
                    <input type="text" id="gifSearchQuery" placeholder="Type to find GIFs..." style="width: 100%;" oninput="debouncedSearch()">
                </div>
            </div>
            <div id="gif-results" class="gif-results"></div>
            <input type="hidden" id="selectedGifUrl">
            <button id="sendAnswerBtn" class="btn btn-primary" style="width: 100%; margin-top: 2.5rem; padding: 1rem; font-size: 1.1rem;">Post to Board</button>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        let quill; let currentQuestions = []; let activeQuestionId = ''; let searchTimeout;
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('id');

        function updateThemeIcon() {
            const theme = document.documentElement.getAttribute('data-theme');
            const icon = document.getElementById('theme-icon');
            if (theme === 'dark') { icon.innerHTML = '<path d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1-8.313-12.454z"></path>'; }
            else { icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>'; }
        }

        async function init() {
            if (!sessionId) return window.location.href = '/';
            document.getElementById('sessionIdDisplay').innerText = `SESSION ID: ${sessionId}`;
            updateThemeIcon();
            quill = new Quill('#editor-container', { theme: 'snow', placeholder: 'What\'s on your mind?' });
            const res = await fetch(`/api/session/get?id=${sessionId}`);
            const session = await res.json();
            document.getElementById('sessionNameTitle').innerText = session.name;
            loadQuestions();
            setInterval(loadAnswers, 4000);
        }

        async function loadQuestions() {
            const res = await fetch(`/api/session/questions?session_id=${sessionId}`);
            currentQuestions = await res.json();
            const container = document.getElementById('questions-container');
            const nav = document.getElementById('nav-questions');

            container.innerHTML = currentQuestions.map(q => `
                <div id="q-${q.id}" style="display: none;">
                    <div style="display: flex; gap: 2.5rem; align-items: flex-start; margin-bottom: 3.5rem; background: var(--glass-bg); padding: 2.5rem; border-radius: 36px; border: 1px solid var(--glass-border);">
                        ${q.gif_url ? `<img src="${q.gif_url}" style="width: 140px; height: 140px; border-radius: 24px; object-fit: cover; box-shadow: var(--glass-shadow);">` : ''}
                        <div style="flex-grow: 1;">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <h2 style="font-size: 2.5rem; margin:0; line-height: 1.1;">${q.text}</h2>
                                <button onclick="openSubmitModal('${q.id}', '${q.text}')" class="btn btn-primary" style="padding: 0.8rem 1.75rem;">Add Card</button>
                            </div>
                            <p style="color: var(--text-secondary); margin-top: 12px; font-size: 1rem; opacity: 0.8;">Collaborative insights on this topic.</p>
                        </div>
                    </div>
                    <div id="answers-${q.id}" class="answers-grid"></div>
                </div>
            `).join('');

            nav.innerHTML = currentQuestions.map((q, i) => `<div class="nav-dot" onclick="showQuestion('${q.id}')" title="Topic ${i+1}"></div>`).join('');
            if (currentQuestions.length > 0) showQuestion(currentQuestions[0].id);
        }

        function showQuestion(id) {
            currentQuestions.forEach(q => { document.getElementById(`q-${q.id}`).style.display = q.id === id ? 'block' : 'none'; });
            document.querySelectorAll('.nav-dot').forEach((dot, i) => { dot.classList.toggle('active', currentQuestions[i].id === id); });
            activeQuestionId = id;
            loadAnswers();
        }

        function nextQuestion() { const idx = currentQuestions.findIndex(q => q.id === activeQuestionId); if (idx < currentQuestions.length - 1) showQuestion(currentQuestions[idx + 1].id); }
        function prevQuestion() { const idx = currentQuestions.findIndex(q => q.id === activeQuestionId); if (idx > 0) showQuestion(currentQuestions[idx - 1].id); }

        async function loadAnswers() {
            const res = await fetch(`/api/session/answers?session_id=${sessionId}`);
            const answers = await res.json();
            currentQuestions.forEach(q => {
                const qAnswers = answers.filter(a => a.question_id === q.id);
                const aContainer = document.getElementById(`answers-${q.id}`);
                
                qAnswers.forEach(a => {
                    const existingCard = document.querySelector(`.answer-card[data-id="${a.id}"]`);
                    const isNegative = a.sentiment_color === '#ef4444' || a.sentiment_color === 'red';
                    const color = a.sentiment_color || '#94a3b8';
                    const emoji = a.sentiment_emoji || '❓';
                    
                    const cardHtml = `
                        <div class="card-face card-front" style="--mood-color: ${color}">
                            <div class="emoji-main" style="font-size: 4rem; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1)); z-index: 2;">${emoji}</div>
                            ${isNegative ? `
                                <div class="warning-overlay">
                                    <span>⚠️ Sensitive</span>
                                    <p>Critical feedback</p>
                                </div>
                            ` : ''}
                        </div>
                        <div class="card-face card-back">
                            <div style="display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 1rem;">
                                <span style="font-weight: 800; font-size: 0.75rem; color: var(--primary); text-transform: uppercase;">${a.author_name || 'Anonymous'}</span>
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <span style="font-size: 1.2rem;">${a.sentiment_emoji || ''}</span>
                                    <div style="background: ${color}; width: 10px; height: 10px; border-radius: 50%;"></div>
                                </div>
                            </div>
                            <div style="font-size: 1.1rem; line-height: 1.5; flex-grow: 1;">${a.text}</div>
                            ${a.gif_url ? `<img src="${a.gif_url}" style="width: 100%; border-radius: 16px; margin-top: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">` : ''}
                        </div>
                    `;

                    if (!existingCard) {
                        const card = document.createElement('div');
                        card.className = 'answer-card';
                        card.dataset.id = a.id;
                        card.dataset.sentiment = color;
                        card.onclick = () => card.classList.toggle('flipped');
                        card.innerHTML = cardHtml;
                        aContainer.appendChild(card);
                    } else if (existingCard.dataset.sentiment !== color) {
                        // Update existing card if sentiment changed (AI finished processing)
                        existingCard.dataset.sentiment = color;
                        existingCard.innerHTML = cardHtml;
                    }
                });
            });
        }

        function debouncedSearch() { clearTimeout(searchTimeout); searchTimeout = setTimeout(searchGifs, 600); }
        async function searchGifs() {
            const query = document.getElementById('gifSearchQuery').value.trim();
            if (query.length < 2) return;
            const results = document.getElementById('gif-results');
            results.innerHTML = '<p style="grid-column: span 4; text-align: center; color: var(--text-muted); font-size: 0.8rem;">Searching...</p>';
            try {
                const res = await fetch(`/api/gifs/search?q=${encodeURIComponent(query)}`);
                const data = await res.json();
                if (data.data && data.data.length > 0) {
                    results.innerHTML = data.data.map(g => `<img src="${g.images.fixed_height_small.url}" class="gif-item" onclick="selectGif('${g.images.fixed_height.url}', this)">`).join('');
                } else { results.innerHTML = '<p style="grid-column: span 4; text-align: center;">No GIFs.</p>'; }
            } catch (e) { results.innerHTML = 'Error.'; }
        }

        function selectGif(url, el) { document.getElementById('selectedGifUrl').value = url; document.querySelectorAll('.gif-item').forEach(i => i.classList.remove('selected')); el.classList.add('selected'); }
        function openSubmitModal(id, text) { activeQuestionId = id; document.getElementById('modalQuestionTitle').innerText = text; document.getElementById('submitModal').classList.remove('hidden'); quill.setContents([]); document.getElementById('gif-results').innerHTML = ''; document.getElementById('selectedGifUrl').value = ''; document.getElementById('gifSearchQuery').value = ''; }
        function closeSubmitModal() { document.getElementById('submitModal').classList.add('hidden'); }
        document.getElementById('sendAnswerBtn').onclick = async () => {
            const text = quill.root.innerHTML; const author = document.getElementById('authorName').value; const gif = document.getElementById('selectedGifUrl').value;
            if (quill.getText().trim().length < 2) return showToast("Write more", "error");
            const btn = document.getElementById('sendAnswerBtn'); btn.disabled = true;
            try {
                const res = await fetch('/api/answer/submit', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ session_id: sessionId, question_id: activeQuestionId, text: text, author_name: author, gif_url: gif }) });
                if (res.ok) { closeSubmitModal(); loadAnswers(); showToast("Sent!", "success"); }
            } finally { btn.disabled = false; }
        };

        function copyInvite() { navigator.clipboard.writeText(window.location.origin + "/session/?id=" + sessionId); showToast("Link copied!", "success"); }
        function showToast(m, t) {
            const c = document.getElementById('toast-container'); const toast = document.createElement('div');
            toast.style.cssText = `background: var(--glass-bg); backdrop-filter: blur(15px); color: var(--text); padding: 1rem 1.5rem; border-radius: 16px; border: 1px solid var(--glass-border); margin-bottom: 0.75rem; animation: fadeUp 0.4s; box-shadow: var(--glass-shadow); font-weight: 700;`;
            toast.innerHTML = `<span>${t === 'error' ? '⚠️' : '✨'}</span> <span>${m}</span>`;
            c.appendChild(toast); setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 400); }, 3500);
        }
        init();
    </script>
</body>
</html>
