<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Session - Discussion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/static/images/logo.svg?v=106">
    <link rel="stylesheet" href="/static/style.css?v=105">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    <style>
        .session-header { padding: 3rem 0 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); margin-bottom: 3rem; }
        
        /* Flip Card Logic */
        .answers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; perspective: 1000px; }
        .answer-card {
            height: 200px; cursor: pointer; position: relative;
            transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .answer-card.flipped { transform: rotateY(180deg); }
        
        .card-face {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 24px; padding: 1.5rem; display: flex; flex-direction: column;
            justify-content: center; align-items: center; border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow); backdrop-filter: blur(10px);
        }
        
        .card-front { background: var(--glass-bg); color: var(--primary); font-weight: 800; font-size: 1.2rem; }
        .card-back { 
            background: rgba(255, 255, 255, 0.9); color: var(--text); 
            transform: rotateY(180deg); align-items: flex-start; justify-content: flex-start;
            overflow-y: auto;
        }
        [data-theme='dark'] .card-back { background: rgba(15, 23, 42, 0.9); }

        /* Warning Overlay for Negative Cards */
        .warning-overlay {
            position: absolute; inset: 0; background: rgba(239, 68, 68, 0.9);
            color: white; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 24px; z-index: 10; text-align: center; padding: 1rem;
            backdrop-filter: blur(8px);
        }
        .warning-overlay span { font-weight: 900; font-size: 0.8rem; margin-bottom: 0.5rem; text-transform: uppercase; }
        .warning-overlay p { font-size: 0.75rem; opacity: 0.9; }

        /* GIF Search UI */
        .gif-search-container { margin-top: 1rem; border: 1px solid var(--glass-border); border-radius: 12px; padding: 0.5rem; background: rgba(255,255,255,0.2); }
        .gif-results { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 10px; max-height: 150px; overflow-y: auto; }
        .gif-item { cursor: pointer; border-radius: 4px; width: 100%; height: 60px; object-fit: cover; transition: 0.2s; }
        .gif-item:hover { transform: scale(1.1); z-index: 10; }
        .gif-item.selected { border: 2px solid var(--primary); }

        #nav-questions {
            position: fixed; bottom: 2.5rem; left: 50%; transform: translateX(-50%);
            display: flex; gap: 0.75rem; background: var(--glass-bg); padding: 0.75rem 1.5rem;
            border-radius: 50px; box-shadow: var(--glass-shadow); z-index: 1000; border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
        }
        .nav-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--text-muted); cursor: pointer; transition: 0.3s; }
        .nav-dot.active { background: var(--primary); transform: scale(1.4); }

        /* Floating Nav Buttons */
        .nav-btn {
            position: fixed; top: 50%; transform: translateY(-50%);
            background: var(--glass-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); border-radius: 50%;
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: var(--glass-shadow); z-index: 900;
            transition: 0.3s; color: var(--primary);
        }
        .nav-btn:hover { background: var(--primary); color: white; transform: translateY(-50%) scale(1.1); }
        .nav-btn.prev { left: 2rem; }
        .nav-btn.next { right: 2rem; }

        @media (max-width: 900px) {
            .nav-btn { display: none; } /* Hide buttons on mobile to avoid overlap, use swipe instead */
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">
        <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
    </button>
    <div id="toast-container" style="position: fixed; top: 1.5rem; right: 1.5rem; z-index: 9999;"></div>

    <div class="container animate-fade-up">
        <header class="session-header">
            <div>
                <h1 id="sessionNameTitle" style="font-size: 1.75rem; margin:0;">Loading...</h1>
                <p id="sessionIdDisplay" style="color: var(--text-muted); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px;"></p>
            </div>
            <div style="display: flex; gap: 0.75rem;">
                <button onclick="exportToPDF()" class="btn btn-ghost" style="border-color: var(--primary); color: var(--primary);">Export PDF</button>
                <button onclick="copyInvite()" class="btn btn-ghost">Copy Invite</button>
                <a href="/" class="btn btn-ghost" style="color: var(--danger);">Exit</a>
            </div>
        </header>

        <div id="questions-container"></div>
        <div id="nav-questions"></div>

        <div class="nav-btn prev" onclick="prevQuestion()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></div>
        <div class="nav-btn next" onclick="nextQuestion()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></div>
    </div>

    <!-- Submit Modal -->
    <div id="submitModal" class="modal-overlay hidden">
        <div class="modal-content" style="max-width: 600px;">
            <button onclick="closeSubmitModal()" style="position: absolute; top: 1.25rem; right: 1.25rem; border: none; background: none; font-size: 1.25rem; cursor: pointer; color: var(--text-muted);">&times;</button>
            <h2 id="modalQuestionTitle" style="font-size: 1.25rem; margin-bottom: 1.5rem;">New Input</h2>
            
            <div id="editor-wrapper" style="border: 1px solid var(--glass-border); border-radius: 12px; overflow: hidden; margin-bottom: 1.5rem;">
                <div id="editor-container" style="height: 120px; font-family: 'Inter', sans-serif;"></div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div>
                    <label style="display: block; font-size: 0.65rem; font-weight: 800; color: var(--text-muted); margin-bottom: 0.5rem; text-transform: uppercase;">Your Name</label>
                    <input type="text" id="authorName" placeholder="Anonymous">
                </div>
                <div>
                    <label style="display: block; font-size: 0.65rem; font-weight: 800; color: var(--text-muted); margin-bottom: 0.5rem; text-transform: uppercase;">GIF Search</label>
                    <div style="display: flex; gap: 5px;">
                        <input type="text" id="gifSearchQuery" placeholder="e.g. happy" style="padding: 0.5rem;">
                        <button onclick="searchGifs()" class="btn btn-primary" style="padding: 0 1rem; font-size: 0.8rem;">Search</button>
                    </div>
                </div>
            </div>

            <div id="gif-results" class="gif-results"></div>
            <input type="hidden" id="selectedGifUrl">

            <button id="sendAnswerBtn" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem; padding: 0.8rem;">Send to Board</button>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        let quill;
        let currentQuestions = [];
        let activeQuestionId = '';
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('id');

        function updateThemeIcon() {
            const theme = document.documentElement.getAttribute('data-theme');
            const icon = document.getElementById('theme-icon');
            if (theme === 'dark') { icon.innerHTML = '<path d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1-8.313-12.454z"></path>'; }
            else { icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>'; }
        }

        function toggleTheme() {
            const target = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('theme', target);
            updateThemeIcon();
        }

        async function init() {
            if (!sessionId) return window.location.href = '/';
            document.getElementById('sessionIdDisplay').innerText = `ID: ${sessionId}`;
            updateThemeIcon();
            quill = new Quill('#editor-container', { theme: 'snow', placeholder: 'Be honest, be helpful...' });
            const res = await fetch(`/api/session/get?id=${sessionId}`);
            const session = await res.json();
            document.getElementById('sessionNameTitle').innerText = session.name;
            loadQuestions();
            setInterval(loadAnswers, 3000);
        }

        async function loadQuestions() {
            const res = await fetch(`/api/session/questions?session_id=${sessionId}`);
            currentQuestions = await res.json();
            const container = document.getElementById('questions-container');
            const nav = document.getElementById('nav-questions');

            container.innerHTML = currentQuestions.map(q => `
                <div id="q-${q.id}" style="display: none;">
                    <div style="display: flex; gap: 2rem; align-items: flex-start; margin-bottom: 3rem; background: var(--glass-bg); padding: 2rem; border-radius: 32px; border: 1px solid var(--glass-border);">
                        ${q.gif_url ? `<img src="${q.gif_url}" style="width: 120px; height: 120px; border-radius: 20px; object-fit: cover; box-shadow: var(--glass-shadow);">` : ''}
                        <div style="flex-grow: 1;">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <h2 style="font-size: 2rem; margin:0; line-height: 1.2;">${q.text}</h2>
                                <button onclick="openSubmitModal('${q.id}', '${q.text}')" class="btn btn-primary">Add Card</button>
                            </div>
                            <p style="color: var(--text-secondary); margin-top: 10px; font-size: 0.9rem;">Share your thoughts on this topic anonymously.</p>
                        </div>
                    </div>
                    <div id="answers-${q.id}" class="answers-grid"></div>
                </div>
            `).join('');

            nav.innerHTML = currentQuestions.map((q, i) => `<div class="nav-dot" onclick="showQuestion('${q.id}')" title="Topic ${i+1}"></div>`).join('');
            if (currentQuestions.length > 0) showQuestion(currentQuestions[0].id);
        }

        function showQuestion(id) {
            currentQuestions.forEach(q => { document.getElementById(`q-${q.id}`).style.display = q.id === id ? 'block' : 'none'; });
            document.querySelectorAll('.nav-dot').forEach((dot, i) => { dot.classList.toggle('active', currentQuestions[i].id === id); });
            activeQuestionId = id;
            loadAnswers();
        }

        function nextQuestion() {
            const idx = currentQuestions.findIndex(q => q.id === activeQuestionId);
            if (idx < currentQuestions.length - 1) showQuestion(currentQuestions[idx + 1].id);
        }

        function prevQuestion() {
            const idx = currentQuestions.findIndex(q => q.id === activeQuestionId);
            if (idx > 0) showQuestion(currentQuestions[idx - 1].id);
        }

        // Swipe Detection
        let touchstartX = 0;
        let touchendX = 0;
        document.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; });
        document.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            if (touchendX < touchstartX - 70) nextQuestion(); // Swipe Left -> Next
            if (touchendX > touchstartX + 70) prevQuestion(); // Swipe Right -> Prev
        }

        async function loadAnswers() {
            const res = await fetch(`/api/session/answers?session_id=${sessionId}`);
            const answers = await res.json();
            
            currentQuestions.forEach(q => {
                const qAnswers = answers.filter(a => a.question_id === q.id);
                const aContainer = document.getElementById(`answers-${q.id}`);
                
                // Smart update to avoid flicker
                const existingIds = Array.from(aContainer.children).map(c => c.dataset.id);
                qAnswers.forEach(a => {
                    if (!existingIds.includes(a.id)) {
                        const card = document.createElement('div');
                        card.className = 'answer-card';
                        card.dataset.id = a.id;
                        card.dataset.sentiment = a.sentiment_color || '#94a3b8';
                        
                        const isNegative = a.sentiment_color === '#ef4444' || a.sentiment_color === 'red';
                        
                        card.onclick = () => flipCard(card);
                        
                        card.innerHTML = `
                            <div class="card-face card-front">
                                ${isNegative ? `
                                    <div class="warning-overlay">
                                        <span>⚠️ Sensitive</span>
                                        <p>Critical feedback detected</p>
                                    </div>
                                ` : '???'}
                            </div>
                            <div class="card-face card-back">
                                <div style="display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 0.75rem;">
                                    <span style="font-weight: 800; font-size: 0.65rem; color: var(--primary); text-transform: uppercase;">${a.author_name || 'Anonymous'}</span>
                                    <div style="background: ${a.sentiment_color || '#94a3b8'}; width: 10px; height: 10px; border-radius: 50%;"></div>
                                </div>
                                <div style="font-size: 0.95rem; line-height: 1.5; flex-grow: 1;">${a.text}</div>
                                ${a.gif_url ? `<img src="${a.gif_url}" style="width: 100%; border-radius: 12px; margin-top: 10px;">` : ''}
                            </div>
                        `;
                        aContainer.appendChild(card);
                    }
                });
            });
        }

        function flipCard(card) {
            if (card.classList.contains('flipped')) return;
            card.classList.add('flipped');
            
            // Auto-flip next card logic
            setTimeout(() => {
                const nextCard = card.nextElementSibling;
                if (nextCard && nextCard.classList.contains('answer-card') && !nextCard.classList.contains('flipped')) {
                    const nextSentiment = nextCard.dataset.sentiment;
                    const isNextNegative = nextSentiment === '#ef4444' || nextSentiment === 'red';
                    
                    if (!isNextNegative) {
                        flipCard(nextCard);
                    } else {
                        showToast("Stopped: Sensitive content ahead", "info");
                    }
                }
            }, 300);
        }

        async function searchGifs() {
            const query = document.getElementById('gifSearchQuery').value;
            if (!query) return;
            const results = document.getElementById('gif-results');
            results.innerHTML = 'Searching...';
            try {
                const res = await fetch(`https://api.giphy.com/v1/gifs/search?api_key=LIVD6OHS9SU3&q=${query}&limit=8`);
                const data = await res.json();
                results.innerHTML = data.data.map(g => `
                    <img src="${g.images.fixed_height_small.url}" class="gif-item" onclick="selectGif('${g.images.fixed_height.url}', this)">
                `).join('');
            } catch (e) { results.innerHTML = 'Error searching GIFs.'; }
        }

        function selectGif(url, el) {
            document.getElementById('selectedGifUrl').value = url;
            document.querySelectorAll('.gif-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
        }

        function openSubmitModal(id, text) { 
            activeQuestionId = id; 
            document.getElementById('modalQuestionTitle').innerText = text; 
            document.getElementById('submitModal').classList.remove('hidden'); 
            quill.setContents([]); 
            document.getElementById('gif-results').innerHTML = '';
            document.getElementById('selectedGifUrl').value = '';
        }
        function closeSubmitModal() { document.getElementById('submitModal').classList.add('hidden'); }

        document.getElementById('sendAnswerBtn').onclick = async () => {
            const text = quill.root.innerHTML; const author = document.getElementById('authorName').value; const gif = document.getElementById('selectedGifUrl').value;
            if (quill.getText().trim().length < 2) return showToast("Please write something meaningful", "error");
            
            const btn = document.getElementById('sendAnswerBtn'); btn.disabled = true; btn.innerText = "Sending...";
            try {
                const res = await fetch('/api/answer/submit', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ session_id: sessionId, question_id: activeQuestionId, text: text, author_name: author, gif_url: gif }) });
                if (res.ok) { closeSubmitModal(); loadAnswers(); showToast("Sent to board!", "success"); }
            } catch (e) { showToast("Failed to send", "error"); }
            finally { btn.disabled = false; btn.innerText = "Send to Board"; }
        };

        function copyInvite() { navigator.clipboard.writeText(window.location.origin + "/session/?id=" + sessionId); showToast("Link copied!", "success"); }

        async function exportToPDF() {
            const element = document.getElementById('questions-container');
            const sessionName = document.getElementById('sessionNameTitle').innerText;
            
            // Temporary reveal all for PDF
            document.querySelectorAll('[id^="q-"]').forEach(q => q.style.display = 'block');
            document.querySelectorAll('.answer-card').forEach(c => c.classList.add('flipped'));

            const opt = {
                margin: 10,
                filename: `Retro_${sessionName}_${sessionId}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            showToast("Generating PDF...", "info");
            try {
                await html2pdf().set(opt).from(element).save();
                showToast("PDF Downloaded", "success");
            } catch (e) {
                showToast("PDF Export failed", "error");
            } finally {
                // Restore UI
                showQuestion(activeQuestionId);
            }
        }
        function showToast(m, t) {
            const c = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.style.cssText = `background: var(--glass-bg); backdrop-filter: blur(10px); color: var(--text); padding: 0.75rem 1rem; border-radius: 12px; border: 1px solid var(--glass-border); margin-bottom: 0.5rem; animation: fadeUp 0.3s ease-out;`;
            toast.innerHTML = `<span>${t === 'error' ? '⚠️' : '✨'}</span> <span>${m}</span>`;
            c.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = '0.3s'; setTimeout(() => toast.remove(), 300); }, 3000);
        }
        init();
    </script>
</body>
</html>
