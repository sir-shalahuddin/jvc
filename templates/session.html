<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Session</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/static/images/logo.svg">
    <link rel="stylesheet" href="/static/style.css?v=82">
    <style>
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            width: 100%;
        }

        .sentiment-badge {
            font-size: 1.5rem;
            margin-bottom: 5px;
            display: inline-block;
        }

        .answer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .sm-answer-card {
            aspect-ratio: 1;
            border-radius: var(--radius-sm);
            border: 1px solid var(--surface-border);
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: all var(--transition);
            background: var(--surface);
            position: relative;
        }

        .sm-answer-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
        }

        .pagination {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            align-items: center;
        }

        .page-info {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .answer-modal-body {
            text-align: center;
        }

        .answer-modal-text {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-top: 1rem;
            color: var(--text);
            text-align: left;
            padding: 1.25rem;
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            border-left: 4px solid var(--primary);
        }

        /* Ensure Quill formatting is visible outside the editor */
        .ql-editor {
            padding: 12px 15px !important;
            min-height: 15rem;
            height: auto !important;
            overflow-y: visible !important;
        }

        .ql-editor ul, .ql-editor ol {
            padding-left: 1.5rem !important;
            margin-bottom: 1rem;
        }

        .ql-editor li {
            list-style-type: initial !important;
            margin-bottom: 0.25rem;
        }

        .modal-sentiment-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 1rem;
        }

        .modal-sentiment-emotion {
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 800;
            font-size: 0.75rem;
        }

        #sessionNameDisplay {
            transition: opacity 0.2s;
            display: inline-block;
        }

        #sessionNameDisplay:hover {
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <button class="theme-toggle" id="themeToggle" title="Toggle Light/Dark Mode">🌓</button>

    <!-- Floating Navigation -->
    <div id="mainNavWrapper" class="main-nav-wrapper">
        <div class="main-nav-container">
            <button id="navLeftBtn" class="nav-btn-floating left hidden" onclick="changePage(-1)" title="Previous Question">❮</button>
            <button id="navRightBtn" class="nav-btn-floating right hidden" onclick="changePage(1)" title="Next Question">❯</button>
        </div>
    </div>

    <div id="toast-container"></div>
    
    <!-- Custom Confirmation Modal -->
    <div id="confirmModal" class="modal-overlay hidden">
        <div class="modal-content" style="max-width: 400px; text-align: center;">
            <h3 id="confirmTitle" style="margin-bottom: 1rem;">Confirm Action</h3>
            <p id="confirmMessage" style="margin-bottom: 2rem; color: var(--text-secondary);">Are you sure?</p>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="btn btn-ghost" id="confirmCancelBtn">Cancel</button>
                <button class="btn btn-danger" id="confirmOkBtn">Confirm</button>
            </div>
        </div>
    </div>

    <div class="container animate-fade">
        <div class="dashboard-header">
            <div id="sessionHeaderContainer" style="flex: 1;">
                <div id="titleContainer" class="hidden">
                    <div class="inline-input-container">
                        <input type="text" id="sessionNameInput" class="inline-edit-input">
                        <button class="btn btn-sm" id="saveSessionNameBtn">Save</button>
                        <button class="btn btn-ghost btn-sm" onclick="toggleSessionNameEdit(false)">✕</button>
                    </div>
                </div>
                <div id="displayNameContainer">
                    <h1 id="sessionNameDisplay" style="font-size: 1.5rem; margin-bottom: 0.25rem; cursor: pointer;">
                        Loading...</h1>
                </div>
                <div id="roleBadgeContainer"></div>
            </div>
            <div id="smControls" class="hidden" style="display: flex; gap: 8px;">
                <button class="btn btn-ghost btn-sm" onclick="copyInviteLink()">🔗 Link</button>
                <button class="btn btn-success btn-sm" id="downloadPdfBtn">📄 PDF</button>
                <button class="btn btn-accent btn-sm" id="addQuestionToggleBtn">➕ Add Question</button>
            </div>
        </div>

        <div id="mainContent">
            <div class="card" style="text-align: center;">
                <p>Loading session data...</p>
            </div>
        </div>
    </div>

    <!-- Answer View Modal -->
    <div id="answerModal" class="modal-overlay hidden">
        <div class="modal-inner-wrapper">
            <div class="modal-nav-container">
                <button id="modalLeftBtn" class="modal-nav-btn left hidden" onclick="navAnsModal(-1)">❮</button>
                <button id="modalRightBtn" class="modal-nav-btn right hidden" onclick="navAnsModal(1)">❯</button>
            </div>
            
            <div class="modal-content" style="max-width: 1000px; width: 100%; padding: 0; background: transparent; border: none; box-shadow: none;">
                <div class="answer-modal-body" id="answerModalContent">
                    <!-- Content injected -->
                </div>
            </div>
        </div>
    </div>

    <!-- GIF Picker Modal (Shared) -->
    <div id="gifPickerModal" class="modal-overlay hidden">
        <div class="modal-content" style="max-width: 600px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h3>Select a GIF</h3>
                <button class="btn btn-ghost btn-sm"
                    onclick="document.getElementById('gifPickerModal').classList.add('hidden')">✕</button>
            </div>
            <input type="text" id="gifSearch" placeholder="Search for something (e.g. fun, success, coffee)...">
            <div id="gifResults"
                style="display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-top: 1rem;">
            </div>
            <div id="gifLoader" class="hidden" style="text-align: center; padding: 10px; font-size: 0.8rem; color: var(--text-secondary);">
                ✨ Loading more GIFs...
            </div>
            <div id="gifSentinel" style="height: 10px;"></div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        // Init state
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('id');
        const isSMRole = urlParams.get('role') === 'sm';
        let questions = [];
        let answers = [];
        let currentQuestionIndex = 0;
        let sessionData = null;
        let currentGifTarget = 'cqGif';
        let gifSearchTimeout = null;
        let quill = null;
        let editMode = null; // 'edit', 'add', null
        let modalCurrentGroup = [];
        let modalCurrentIndex = 0;

        // Persistent Identity
        let userProfile = JSON.parse(localStorage.getItem('retro_profile') || '{}');
        userProfile.name = "Anonymous";

        // Theme logic
        const html = document.documentElement;
        html.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
        document.getElementById('themeToggle').onclick = () => {
            const newTheme = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        };

        // Shared GIF Logic
        let submittedQuestions = JSON.parse(localStorage.getItem(`submitted_${sessionId}`) || '[]');
        let gifNextPos = "0";
        let gifLoading = false;
        let currentGifQuery = "";
        let gifObserver = null;

        function openGifPicker(targetId) {
            currentGifTarget = targetId;
            document.getElementById('gifPickerModal').classList.remove('hidden');
            document.getElementById('gifSearch').focus();
            
            // Setup observer on open if not exists
            if (!gifObserver) {
                gifObserver = new IntersectionObserver((entries) => {
                    if (entries[0].isIntersecting && currentGifQuery && !gifLoading && gifNextPos !== "0") {
                        searchGifs(true);
                    }
                }, { threshold: 0.1 });
                gifObserver.observe(document.getElementById('gifSentinel'));
            }
        }

        async function searchGifs(append = false) {
            const q = document.getElementById('gifSearch').value.trim();
            if (!q) {
                document.getElementById('gifResults').innerHTML = "";
                currentGifQuery = "";
                gifNextPos = "0";
                return;
            }

            if (gifLoading) return;
            
            if (!append) {
                document.getElementById('gifResults').innerHTML = "<p style='grid-column: 1/-1; text-align:center;'>Searching...</p>";
                gifNextPos = "0";
                currentGifQuery = q;
            }

            gifLoading = true;
            document.getElementById('gifLoader').classList.toggle('hidden', !append);
            
            try {
                const limit = 20;
                const url = `https://g.tenor.com/v1/search?q=${encodeURIComponent(currentGifQuery)}&key=LIVDSRZULELA&limit=${limit}&pos=${gifNextPos}`;
                const res = await fetch(url);
                const data = await res.json();
                
                gifNextPos = data.next || "0";
                
                let h = '';
                data.results.forEach(g => {
                    const gifUrl = g.media[0].gif.url;
                    h += `<img src="${gifUrl}" class="gif-result-img" onclick="selectGif('${gifUrl}')" loading="lazy">`;
                });

                if (append) {
                    const temp = document.createElement('div');
                    temp.innerHTML = h;
                    while (temp.firstChild) {
                        document.getElementById('gifResults').appendChild(temp.firstChild);
                    }
                } else {
                    document.getElementById('gifResults').innerHTML = h || "<p style='grid-column: 1/-1; text-align:center;'>No results.</p>";
                }
            } catch (e) { 
                console.error(e);
                if (!append) document.getElementById('gifResults').innerHTML = "<p style='grid-column: 1/-1; text-align:center;'>Error fetching GIFs.</p>"; 
            } finally {
                gifLoading = false;
                document.getElementById('gifLoader').classList.add('hidden');
            }
        }

        document.getElementById('gifSearch').oninput = (e) => {
            clearTimeout(gifSearchTimeout);
            gifSearchTimeout = setTimeout(() => searchGifs(false), 500);
        };

        async function init() {
            if (!sessionId) {
                document.getElementById('mainContent').innerHTML = "<div class='card'><p>Invalid session ID.</p></div>";
                return;
            }

            try {
                const res = await fetch(`/api/session/get?id=${sessionId}`);
                if (!res.ok) throw new Error("Session not found");
                sessionData = await res.json();

                if (isSMRole && !sessionData.is_owner) {
                    window.location.href = `/session/?id=${sessionId}`;
                    return;
                }

                document.getElementById('sessionNameDisplay').innerText = sessionData.name || "Sprint Retrospective";
                if (sessionData.is_owner) {
                    document.getElementById('sessionNameDisplay').onclick = () => toggleSessionNameEdit(true);
                    document.getElementById('smControls').classList.remove('hidden');

                    document.getElementById('addQuestionToggleBtn').onclick = () => {
                        editMode = 'add';
                        renderView();
                    };

                    document.getElementById('downloadPdfBtn').onclick = () => {
                        window.location.href = `/api/session/report?session_id=${sessionId}`;
                    };
                } else {
                    document.getElementById('roleBadgeContainer').innerHTML = `
                        <div style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 4px;">Identifying as: <strong style="color: var(--primary);">${userProfile.name}</strong></div>
                    `;
                }

                // Periodic refresh for everyone
                setInterval(async () => {
                    await fetchAnswers();
                    updateAnswersOnly();
                }, 5000);

                await fetchQuestions();
                await fetchAnswers();
                renderView();

            } catch (e) {
                document.getElementById('mainContent').innerHTML = `<div class='card'><p>${e.message}</p></div>`;
            }
        }

        function renderSprinter(q) {
            if (submittedQuestions.includes(q.id)) {
                renderSprinterResults(q);
                return;
            }

            document.getElementById('mainContent').innerHTML = `
                <div class="card animate-slide-fade">
                    <h2 style="text-align:center; font-size: 1.5rem; margin-bottom: 1.5rem;">${q.text}</h2>
                    ${q.gif_url ? `<div style="text-align:center; margin-bottom:1.5rem;"><img src="${q.gif_url}" style="border-radius:var(--radius-sm); max-height:220px;"></div>` : ''}
                    
                    <div id="editor-container" style="min-height: 15rem; margin-bottom: 1rem;"></div>
                    
                    <div id="ansGifPreview" style="margin-bottom:1rem;" class="hidden"></div>
                    
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div style="display:flex; gap:8px;">
                            <button class="btn btn-ghost btn-sm" onclick="openGifPicker('ansGif')">🎬 Add GIF</button>
                            <input type="hidden" id="ansGif" value="">
                        </div>
                        <button class="btn" id="submitBtn" onclick="sendAns(${q.id})" style="padding:10px 30px;">Submit Response</button>
                    </div>
                    ${pagination()}
                </div>`;

            quill = new Quill('#editor-container', {
                theme: 'snow',
                placeholder: 'Your feedback here...',
                modules: { toolbar: [['bold', 'italic', 'underline', 'strike'], [{ 'list': 'ordered' }, { 'list': 'bullet' }], ['clean']] }
            });
        }

        function renderSprinterResults(q) {
            const qAns = answers.filter(a => a.question_id === q.id);
            document.getElementById('mainContent').innerHTML = `
                <div class="card animate-slide-fade">
                    <div style="text-align:center; margin-bottom: 1.5rem;">
                        <span class="badge badge-success" style="margin-bottom:0.5rem;">Response Submitted ✓</span>
                        <h2 style="font-size: 1.5rem;">${q.text}</h2>
                    </div>
                    <div style="margin-top:1rem; border-top:1px solid var(--surface-border); padding-top:1rem;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                            <h3>All Feedback</h3>
                            <span class="badge" id="ans-count-${q.id}">${qAns.length} Total</span>
                        </div>
                        <div id="answers-container-${q.id}"></div>
                    </div>
                    ${pagination()}
                </div>`;
            updateAnswersOnly();
        }

        async function sendAns(qId) {
            const text = quill.root.innerHTML.trim();
            if (text === '<p><br></p>' || !text) return;
            const gif = document.getElementById('ansGif').value;
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;

            const res = await fetch("/api/answer/submit", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ session_id: sessionId, question_id: qId, text, gif_url: gif, author_name: userProfile.name })
            });

            if (res.ok) {
                btn.innerText = "Sent ✓";
                btn.classList.add('btn-success');

                // Track submission
                submittedQuestions.push(qId);
                localStorage.setItem(`submitted_${sessionId}`, JSON.stringify(submittedQuestions));

                setTimeout(() => {
                    renderView(); // Show results
                }, 1000);
            } else btn.disabled = false;
        }

        async function fetchQuestions() {
            const res = await fetch(`/api/session/questions?session_id=${sessionId}`);
            questions = await res.json() || [];
        }
        async function fetchAnswers() {
            const res = await fetch(`/api/session/answers?session_id=${sessionId}`);
            answers = await res.json() || [];
        }

        function toggleSessionNameEdit(show) {
            document.getElementById('displayNameContainer').classList.toggle('hidden', show);
            document.getElementById('titleContainer').classList.toggle('hidden', !show);
            if (show) {
                const input = document.getElementById('sessionNameInput');
                input.value = document.getElementById('sessionNameDisplay').innerText;
                input.focus();
                input.select();
            }
        }

        document.getElementById('saveSessionNameBtn').onclick = async () => {
            const newName = document.getElementById('sessionNameInput').value.trim();
            if (!newName) return;
            await fetch('/api/session/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: sessionId, name: newName })
            });
            document.getElementById('sessionNameDisplay').innerText = newName;
            toggleSessionNameEdit(false);
        };

        function renderView() {
            if (editMode === 'add') {
                renderQuestionForm();
                return;
            }

            if (questions.length === 0) {
                document.getElementById('mainContent').innerHTML = `
                    <div class="card" style="text-align:center; padding: 4rem 2rem;">
                        <p style="color:var(--text-secondary);">No questions yet.</p>
                        ${sessionData.is_owner ? `<button class="btn btn-sm" style="margin-top:1rem;" onclick="editMode='add'; renderView();">Add First Question</button>` : ''}
                    </div>`;
                return;
            }
            if (currentQuestionIndex >= questions.length) currentQuestionIndex = questions.length - 1;
            const q = questions[currentQuestionIndex];

            if (sessionData.is_owner) {
                if (editMode === 'edit') renderQuestionForm(q);
                else renderSM(q);
            } else {
                renderSprinter(q);
            }
            updateFloatingNav();
        }

        function updateFloatingNav() {
            const leftBtn = document.getElementById('navLeftBtn');
            const rightBtn = document.getElementById('navRightBtn');
            
            if (editMode === 'add' || editMode === 'edit' || questions.length === 0) {
                leftBtn.classList.add('hidden');
                rightBtn.classList.add('hidden');
                return;
            }
            
            leftBtn.classList.remove('hidden');
            rightBtn.classList.remove('hidden');
            
            leftBtn.disabled = currentQuestionIndex === 0;
            rightBtn.disabled = currentQuestionIndex >= questions.length - 1;
        }

        function renderQuestionForm(q = null) {
            const title = q ? "Edit Question" : "Add New Question";
            const id = q ? q.id : "";
            const text = q ? q.text : "";
            const gif = (q && q.gif_url) ? q.gif_url : "";

            document.getElementById('mainContent').innerHTML = `
                <div class="card animate-slide-fade">
                    <h3 style="margin-bottom: 1.5rem;">${title}</h3>
                    <input type="hidden" id="editQId" value="${id}">
                    <input type="text" id="cqText" placeholder="Enter question text (e.g. What went well?)" value="${text.replace(/"/g, '&quot;')}" style="margin-bottom: 1rem; font-size: 1.1rem; padding: 12px 14px;">
                    
                    <div style="margin-bottom: 1.5rem;">
                        <div id="cqGif_preview" style="margin-bottom: 10px;" class="${gif ? '' : 'hidden'}">
                            ${gif ? `<div class="gif-preview-container"><img src="${gif}" style="max-height:100px; border-radius:4px;"><button onclick="removeSelectedGif('cqGif')" class="gif-remove-btn">✕</button></div>` : ''}
                        </div>
                        <div style="display: flex; gap: 10px;">
                            <button class="btn btn-ghost btn-sm" onclick="openGifPicker('cqGif')">🔍 Find GIF</button>
                            <input type="hidden" id="cqGif" value="${gif}">
                            <label class="btn btn-ghost btn-sm" style="margin-bottom:0;">
                                 📸 Image
                                <input type="file" accept="image/*" class="hidden" onchange="handleImageUpload(this, 'cqGif', 'cqGif_preview')">
                            </label>
                        </div>
                    </div>

                    <div style="display: flex; gap: 10px; justify-content: flex-end;">
                        <button class="btn btn-ghost" onclick="cancelEdit()">Cancel</button>
                        <button class="btn btn-accent" id="saveQuestionBtn" onclick="saveQuestion()">Save Question</button>
                    </div>
                </div>`;
            document.getElementById('cqText').focus();
        }

        function cancelEdit() {
            editMode = null;
            renderView();
        }

        async function saveQuestion() {
            const id = document.getElementById('editQId').value;
            const text = document.getElementById('cqText').value.trim();
            const gif = document.getElementById('cqGif').value;
            if (!text) return;
            const path = id ? '/api/question/update' : '/api/question/add';
            const body = { session_id: sessionId, text, gif_url: gif };
            if (id) body.id = parseInt(id);

            const btn = document.getElementById('saveQuestionBtn');
            btn.disabled = true;
            btn.innerText = "Saving...";

            await fetch(path, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            editMode = null;
            await fetchQuestions();
            renderView();
        }

        function renderSM(q) {
            const qAns = answers.filter(a => a.question_id === q.id);
            document.getElementById('mainContent').innerHTML = `
                <div class="card animate-slide-fade">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <div style="flex:1;">
                            <h2 style="font-size: 1.5rem; margin-bottom: 1rem; cursor: pointer;" onclick="enterEditMode()">${q.text}</h2>
                            ${q.gif_url ? `<img src="${q.gif_url}" style="border-radius: var(--radius-sm); max-height: 180px; margin-bottom: 1rem; cursor: pointer;" onclick="enterEditMode()">` : ''}
                        </div>
                        <div style="display: flex; gap: 8px;">
                            <button class="btn btn-ghost btn-sm" onclick="enterEditMode()">Edit</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteQuestion(${q.id})">Del</button>
                        </div>
                    </div>
                    <div style="margin-top:2rem; border-top:1px solid var(--surface-border); padding-top:1rem;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                            <h3>Responses</h3>
                            <span class="badge badge-success" id="ans-count-${q.id}">${qAns.length} Total</span>
                        </div>
                        <div id="answers-container-${q.id}"></div>
                    </div>
                    ${pagination()}
                </div>`;
            updateAnswersOnly();
        }

        function enterEditMode() {
            editMode = 'edit';
            renderView();
        }

        function updateAnswersOnly() {
            const q = questions[currentQuestionIndex];
            if (!q || editMode) return;
            const qAns = answers.filter(a => a.question_id === q.id);
            const container = document.getElementById(`answers-container-${q.id}`);
            if (!container) return;

            if (qAns.length === 0) {
                container.innerHTML = `<p style="font-style:italic; color:var(--text-muted);">Waiting...</p>`;
            } else {
                let html = `<div class="answer-grid">`;
                qAns.forEach((ans, index) => {
                    const color = ans.sentiment_color || "var(--bg-secondary)";
                    html += `
                        <div class="sm-answer-card shadow-sm" style="border-bottom: 4px solid ${color};" onclick='openModalForAnswer(${index})'>
                            <span class="sentiment-badge">${ans.sentiment_emoji || '💬'}</span>
                            <div style="font-size: 0.7rem; font-weight: 700; margin-top: 8px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em;">${ans.author_name || 'Anonymous'}</div>
                        </div>`;
                });
                container.innerHTML = html + `</div>`;
            }
        }

        function pagination() {
            return '';
        }

        function changePage(delta) { currentQuestionIndex += delta; editMode = null; renderView(); }

        async function deleteQuestion(id) {
            const confirmed = await showConfirm("Delete Question?", "Are you sure you want to delete this question? This action cannot be undone.");
            if (!confirmed) return;
            await fetch('/api/question/delete', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ session_id: sessionId, id }) });
            await fetchQuestions();
            if (currentQuestionIndex >= questions.length) currentQuestionIndex = Math.max(0, questions.length - 1);
            showToast("Question deleted", "success");
            renderView();
        }

        function openModalForAnswer(index) {
            const q = questions[currentQuestionIndex];
            modalCurrentGroup = answers.filter(a => a.question_id === q.id);
            modalCurrentIndex = index;
            renderModalContent();
            document.getElementById('answerModal').classList.remove('hidden');
        }

        function renderModalContent() {
            if (modalCurrentGroup.length === 0) return;
            const ans = modalCurrentGroup[modalCurrentIndex];
            const content = document.getElementById('answerModalContent');
            
            let html = '';
            const sentimentHeader = `
                <div class="modal-sentiment-info" style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1rem;">
                    <span style="font-size: 3.5rem;">${ans.sentiment_emoji}</span>
                    <div style="text-align: left;">
                        <div class="modal-sentiment-emotion" style="color:${ans.sentiment_color}; font-size: 1.5rem; font-weight: 800; text-transform: uppercase;">${ans.sentiment_emotion}</div>
                        <div style="font-size: 0.85rem; color: var(--text-muted); font-weight: 600;">AI Predicted Sentiment</div>
                    </div>
                </div>
            `;
            
            if (ans.gif_url) {
                html += `
                <div style="display: flex; flex-direction: row; gap: 2.5rem; align-items: center; justify-content: center; flex-wrap: wrap;">
                    
                    <div style="flex: 1; min-width: 250px; display: flex; flex-direction: column; gap: 1rem; align-items: center; justify-content: center;">
                        <img src="${ans.gif_url}" style="width: 100%; max-width: 400px; border-radius: var(--radius-lg); object-fit: contain; box-shadow: var(--shadow-xl); transform: rotate(-2deg); transition: transform 0.3s;" onmouseover="this.style.transform='rotate(0deg) scale(1.02)'" onmouseout="this.style.transform='rotate(-2deg) scale(1)'">
                    </div>
                    
                    <div style="flex: 1.5; min-width: 300px; background: var(--surface); border: 1px solid var(--surface-border); border-radius: var(--radius); padding: 2.5rem; box-shadow: var(--shadow-xl); display: flex; flex-direction: column; max-height: 80vh;">
                        ${sentimentHeader}
                        <div style="overflow-y: auto; padding-right: 10px; flex-grow: 1;">
                            <div class="answer-modal-text ql-snow" style="height: auto; margin-top: 0; background: var(--bg-secondary); border-radius: var(--radius-sm); padding: 1.5rem; border-left: 4px solid var(--primary);">
                                <div class="ql-editor" style="padding: 0 !important; min-height: auto;">${ans.text}</div>
                            </div>
                        </div>
                        
                        <div style="text-align: right; margin-top: 1.5rem; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--surface-border); padding-top: 1rem;">
                            ${modalCurrentGroup.length > 1 ? `<span style="font-size: 0.85rem; color: var(--text-secondary); font-weight: 600;">${modalCurrentIndex + 1} of ${modalCurrentGroup.length}</span>` : '<span></span>'}
                            <button class="btn btn-ghost" onclick="document.getElementById('answerModal').classList.add('hidden')">Close</button>
                        </div>
                    </div>
                </div>`;
            } else {
                html += `
                <div style="background: var(--surface); border: 1px solid var(--surface-border); border-radius: var(--radius); padding: 2.5rem; box-shadow: var(--shadow-xl); max-height: 80vh; display: flex; flex-direction: column; margin: 0 auto; max-width: 600px;">
                    ${sentimentHeader}
                    <div style="overflow-y: auto; padding-right: 10px;">
                        <div class="answer-modal-text ql-snow" style="margin-top: 0; background: var(--bg-secondary); border-radius: var(--radius-sm); padding: 1.5rem; border-left: 4px solid var(--primary);">
                            <div class="ql-editor" style="padding: 0 !important; min-height: auto;">${ans.text}</div>
                        </div>
                    </div>
                    <div style="text-align: right; margin-top: 1.5rem; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--surface-border); padding-top: 1rem;">
                        ${modalCurrentGroup.length > 1 ? `<span style="font-size: 0.85rem; color: var(--text-secondary); font-weight: 600;">${modalCurrentIndex + 1} of ${modalCurrentGroup.length}</span>` : '<span></span>'}
                        <button class="btn btn-ghost" onclick="document.getElementById('answerModal').classList.add('hidden')">Close</button>
                    </div>
                </div>`;
            }

            if (modalCurrentGroup.length > 1) {
                document.getElementById('modalLeftBtn').classList.remove('hidden');
                document.getElementById('modalRightBtn').classList.remove('hidden');
                document.getElementById('modalLeftBtn').disabled = modalCurrentIndex === 0;
                document.getElementById('modalRightBtn').disabled = modalCurrentIndex === modalCurrentGroup.length - 1;
            } else {
                document.getElementById('modalLeftBtn').classList.add('hidden');
                document.getElementById('modalRightBtn').classList.add('hidden');
            }
            content.innerHTML = html;
        }

        function navAnsModal(dir) {
            modalCurrentIndex += dir;
            if (modalCurrentIndex < 0) modalCurrentIndex = 0;
            if (modalCurrentIndex >= modalCurrentGroup.length) modalCurrentIndex = modalCurrentGroup.length - 1;
            renderModalContent();
        }

        function selectGif(url) {
            document.getElementById(currentGifTarget).value = url;
            const prevId = currentGifTarget === 'cqGif' ? 'cqGif_preview' : 'ansGifPreview';
            const prev = document.getElementById(prevId);
            prev.innerHTML = `<div class="gif-preview-container">
                <img src="${url}" style="max-height:100px; border-radius:4px;">
                <button onclick="removeSelectedGif('${currentGifTarget}')" class="gif-remove-btn" title="Remove GIF">✕</button>
            </div>`;
            prev.classList.remove('hidden');
            document.getElementById('gifPickerModal').classList.add('hidden');
        }

        function removeSelectedGif(id) {
            document.getElementById(id).value = "";
            const prevId = id === 'cqGif' ? 'cqGif_preview' : 'ansGifPreview';
            document.getElementById(prevId).innerHTML = "";
            document.getElementById(prevId).classList.add('hidden');
        }

        function copyInviteLink() {
            const url = `${window.location.origin}/session/?id=${sessionId}`;
            navigator.clipboard.writeText(url).then(() => {
                showToast("Link copied to clipboard!", "success");
            });
        }

        async function handleImageUpload(inputEl, targetInputId, previewId) {
            const file = inputEl.files[0];
            if (!file) return;
            const fd = new FormData();
            fd.append('image', file);
            try {
                const res = await fetch('/api/upload', { method: 'POST', body: fd });
                const data = await res.json();
                if (data.url) selectGif(data.url);
            } catch (e) { showToast('Upload failed!', 'error'); }
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            
            let icon = 'ℹ️';
            if (type === 'success') icon = '✅';
            if (type === 'error') icon = '❌';

            toast.innerHTML = `
                <span class="toast-icon">${icon}</span>
                <span class="toast-message">${message}</span>
            `;

            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('toast-out');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function showConfirm(title, message) {
            return new Promise((resolve) => {
                const modal = document.getElementById('confirmModal');
                const titleEl = document.getElementById('confirmTitle');
                const msgEl = document.getElementById('confirmMessage');
                const okBtn = document.getElementById('confirmOkBtn');
                const cancelBtn = document.getElementById('confirmCancelBtn');

                titleEl.textContent = title;
                msgEl.textContent = message;
                modal.classList.remove('hidden');

                const cleanup = (result) => {
                    modal.classList.add('hidden');
                    okBtn.onclick = null;
                    cancelBtn.onclick = null;
                    resolve(result);
                };

                okBtn.onclick = () => cleanup(true);
                cancelBtn.onclick = () => cleanup(false);
            });
        }

        // Close modal on click outside
        document.getElementById('answerModal').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.add('hidden');
            }
        });

        init();
    </script>
    <button onclick="openTrakteer()" class="trakteer-floating" style="border: none; cursor: pointer;">
        <img src="https://edge-cdn.trakteer.id/images/embed/trbtn-icon.png" alt="Trakteer Icon">
        <span class="trakteer-text">Dukung Saya</span>
    </button>

    <!-- Trakteer Custom Modal -->
    <div id="trakteerModal" class="modal-overlay hidden">
        <div class="trakteer-container">
            <iframe id="trakteerIframe" frameborder="0"></iframe>
        </div>
    </div>

    <script>
        let lastTheme = null;
        function openTrakteer() {
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
            const iframe = document.getElementById('trakteerIframe');
            const themeParam = currentTheme === 'dark' ? '?theme=dark' : '?theme=light';
            
            // Always refresh SRC to ensure it's never blank on re-open
            iframe.src = "https://trakteer.id/v1/sirdev/tip/embed/modal" + themeParam + "&v=" + Date.now();
            
            iframe.onload = function() {
                if (iframe.contentWindow) {
                    iframe.contentWindow.postMessage({type: 'embed.openModal'}, '*');
                }
            };

            document.getElementById('trakteerModal').classList.remove('hidden');
        }

        function closeTrakteer() {
            document.getElementById('trakteerModal').classList.add('hidden');
        }

        // Listen for close event from Trakteer Iframe
        window.addEventListener('message', function(e) {
            if (e.data && e.data.type === 'embed.modalClosed') {
                closeTrakteer();
            }
        });
    </script>
</body>

</html>
